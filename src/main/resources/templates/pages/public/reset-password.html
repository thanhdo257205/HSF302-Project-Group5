<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/assets/css/common.css}">
    <link rel="stylesheet" th:href="@{/assets/css/public.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header(activePage='login')}"></div>

<section class="auth-wrapper" style="background-color: #f4f6f8;">
    <div class="candidate-register-container" style="max-width: 500px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1" style="color: #212f3f;">Đặt lại mật khẩu</h3>
            <p class="text-muted small">Vui lòng nhập mật khẩu mới của bạn bên dưới.</p>
        </div>

        <!-- Thông báo thành công -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Thông báo lỗi -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Chỉ hiển thị form khi chưa thành công hoặc không có lỗi nghiêm trọng về token (hoặc hiển thị tuỳ backend xử lý) -->
        <form th:action="@{/reset-password}" method="post" th:if="${success == null}">
            <!-- Token ẩn nhận từ URL -->
            <input type="hidden" name="token" th:value="${token}">

            <div class="mb-3">
                <label class="topcv-label" for="passwordField">Mật khẩu mới</label>
                <div class="topcv-input-group">
                    <i class="bi bi-lock prefix-icon text-green-topcv"></i>
                    <input type="password" name="password" id="passwordField" class="form-control" placeholder="Nhập mật khẩu mới" required>
                    <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('passwordField', this)"></i>
                </div>
            </div>

            <div class="mb-4">
                <label class="topcv-label" for="confirmPasswordField">Xác nhận mật khẩu mới</label>
                <div class="topcv-input-group">
                    <i class="bi bi-lock prefix-icon text-green-topcv"></i>
                    <input type="password" name="confirmPassword" id="confirmPasswordField" class="form-control" placeholder="Xác nhận mật khẩu mới" required>
                    <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('confirmPasswordField', this)"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-topcv-green-submit mb-3">
                Cập nhật mật khẩu <i class="bi bi-check-lg ms-1"></i>
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none fw-bold text-green-topcv small">
                <i class="bi bi-arrow-left"></i> Quay lại Đăng nhập
            </a>
        </div>
    </div>
</section>

<script>
    function togglePasswordVisibility(fieldId, iconElement) {
        const passwordInput = document.getElementById(fieldId);
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            iconElement.classList.remove('bi-eye-slash');
            iconElement.classList.add('bi-eye');
        } else {
            passwordInput.type = 'password';
            iconElement.classList.remove('bi-eye');
            iconElement.classList.add('bi-eye-slash');
        }
    }
</script>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
