<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/assets/css/common.css}">
    <link rel="stylesheet" th:href="@{/assets/css/public.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header(activePage='login')}"></div>

<section class="auth-wrapper" style="background-color: #f4f6f8;">
    <div class="candidate-register-container" style="max-width: 500px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1" style="color: #212f3f;">Quên mật khẩu</h3>
            <p class="text-muted small">Nhập địa chỉ email của bạn để nhận liên kết đặt lại mật khẩu.</p>
        </div>

        <!-- Thông báo thành công -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Thông báo lỗi -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-4">
                <label class="topcv-label" for="emailInput">Địa chỉ Email</label>
                <div class="topcv-input-group">
                    <i class="bi bi-envelope prefix-icon text-green-topcv"></i>
                    <input type="email" name="email" id="emailInput" class="form-control" placeholder="Nhập email của bạn" required>
                </div>
            </div>

            <button type="submit" class="btn btn-topcv-green-submit mb-3">
                Gửi yêu cầu đặt lại mật khẩu <i class="bi bi-send ms-1"></i>
            </button>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-decoration-none fw-bold text-green-topcv small">
                    <i class="bi bi-arrow-left"></i> Quay lại Đăng nhập
                </a>
            </div>
        </form>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
