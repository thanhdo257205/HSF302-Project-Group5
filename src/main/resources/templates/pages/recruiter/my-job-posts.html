<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách tin tuyển dụng - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/recruiter.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="recruiter-layout">
    <div th:replace="~{fragments/recruiter-sidebar :: recruiter-sidebar}"></div>

    <main class="recruiter-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0">Danh sách tin tuyển dụng</h3>
            <a th:href="@{/recruiter/create-job}" class="btn btn-primary-custom px-3"><i class="bi bi-plus-lg me-2"></i>Đăng tin mới</a>
        </div>

        <!-- Thống kê -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon primary"><i class="bi bi-briefcase"></i></div>
                    <div>
                        <h3 class="fw-bold mb-0" th:text="${statistic.recruitmentInformation}"></h3>
                        <p class="text-muted small mb-0">Tổng tin tuyển dụng</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon success"><i class="bi bi-play-circle"></i></div>
                    <div>
                        <h3 class="fw-bold mb-0 text-success" th:text="${statistic.currentlyHiring}"></h3>
                        <p class="text-muted small mb-0">Đang tuyển</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon warning"><i class="bi bi-hourglass-split"></i></div>
                    <div>
                        <h3 class="fw-bold mb-0 text-warning" th:text="${statistic.awatingApproval}"></h3>
                        <p class="text-muted small mb-0">Chờ duyệt</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-icon danger"><i class="bi bi-x-circle"></i></div>
                    <div>
                        <h3 class="fw-bold mb-0 text-danger" th:text="${statistic.closed}"></h3>
                        <p class="text-muted small mb-0">Đã đóng / Từ chối</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bảng danh sách -->
        <form th:action="@{/recruiter/list-job-posts}" method="get" >
        <div class="card card-custom p-4">
            <div class="row mb-3">
                <div class="col-md-5">
                    <div class="input-group">
                        <input type="text" class="form-control border-end-0" name="text_search" th:value="${textSearch}" placeholder="Tìm kiếm tin tuyển dụng...">
                        <button class="btn btn-search-custom border-start-0 bg-transparent text-muted" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="job_status" onchange="this.form.submit()">
                        <option value="">Tất cả trạng thái</option>
                        <option th:value="${status}" th:each="status : ${jobStatusList}" th:selected="${status == jobStatus}" th:text="${status.displayName}"></option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>Tiêu đề công việc</th>
                        <th>Ngày đăng</th>
                        <th class="text-center">Số ứng viên</th>
                        <th>Trạng thái</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${jobPostDashboardList.isEmpty()}"><td class="text-center" colspan="5" th:text="'Danh sách tin tuyển dụng trống!'"></td></tr>
                    <tr th:each="job : ${jobPostDashboardList.content}">
                        <td><a href="#" class="fw-bold text-decoration-none text-primary" th:text="${job.title}"></a></td>
                        <td class="text-muted" th:text="${#temporals.format(job.postedDate,'dd-MM-yyyy')}"></td>
                        <td class="text-center fw-bold text-success"><a href="applicant-list.html" class="text-decoration-none text-success" th:text="${job.vacancies}"></a></td>
                        <td><span class="badge badge-soft-success" th:if="${job.status.name == 'APPROVED'}">Đang tuyển</span>
                            <span class="badge badge-soft-warning" th:if="${job.status.name == 'PENDING'}">Chờ duyệt</span>
                            <span class="badge badge-soft-danger" th:if="${job.status.name == 'REJECTED'}">Bị từ chối</span>
                            <span class="badge badge-soft-secondary" th:if="${job.status.name == 'CLOSED'}">Đã đóng</span>
                        </td>
                        <td class="text-end">
                            <a href="job-detail.html" class="btn btn-sm btn-outline-primary-custom me-1" title="Xem chi tiết"><i class="bi bi-eye"></i></a>
                            <a href="edit-job.html" class="btn btn-sm btn-outline-primary-custom me-1" title="Chỉnh sửa"><i class="bi bi-pencil"></i></a>
<!--                            <button class="btn btn-sm btn-outline-danger" title="Đóng tin" data-bs-toggle="modal" data-bs-target="#actionModal"><i class="bi bi-stop-circle"></i></button>-->
<!--                            <button class="btn btn-sm btn-outline-primary-custom" title="Mở tin tin" data-bs-toggle="modal" data-bs-target="#actionModal"><i class="bi bi-arrow-clockwise"></i></button>-->
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav aria-label="Page navigation" class="mt-3" th:if="${jobPostDashboardList.totalPages > 1}">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item"><a class="page-link" th:classappend="${!jobPostDashboardList.hasPrevious()} ? 'disabled'" th:href="@{/recruiter/list-job-posts(page=${jobPostDashboardList.number - 1}, text_search=${textSearch},job_status=${jobStatus})}">Trước</a></li>
                    <li class="page-item" th:classappend="${i == jobPostDashboardList.number} ? 'active'" th:each="i : ${#numbers.sequence(0,jobPostDashboardList.totalPages - 1)}">
                        <a class="page-link"  th:href="@{/recruiter/list-job-posts(page=${i},text_search=${textSearch},job_status=${jobStatus})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item"><a class="page-link" th:classappend="${!jobPostDashboardList.hasNext()} ? 'disabled'" th:href="@{/recruiter/list-job-posts(page=${jobPostDashboardList.number + 1}, text_search=${textSearch}, job_status=${jobStatus})}">Sau</a></li>
                </ul>
            </nav>
        </div>
        </form>
    </main>
</div>

<!-- Modal Đóng Tin / Xem Lý Do -->
<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="actionModalLabel">Thông báo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="actionModalBody">
                <!-- Content sẽ được fill động, đây là placeholder -->
                Bạn có chắc chắn muốn thực hiện thao tác này?
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
