<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việc làm đã lưu - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/candidate.css">
</head>
<body>

<div th:replace="~{fragments/header.html :: header}"></div>

<div class="candidate-layout">
    <div th:replace="~{fragments/candidate-sidebar.html :: candidate-sidebar}"></div>

    <main class="candidate-content">
        <h3 class="fw-bold mb-4">Việc làm đã lưu</h3>

        <!-- Chuyển sang dạng Grid (dạng ô) cho đẹp -->
        <div class="row g-4">
            <!-- Trường hợp không có việc làm nào đã lưu -->
            <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(savedJobs)}">
                <i class="bi bi-heartbreak text-muted" style="font-size: 3.5rem;"></i>
                <p class="text-muted mt-3 fs-5">Bạn chưa lưu việc làm nào.</p>
                <a th:href="@{/candidate/jobs/list-job}" class="btn btn-primary-custom px-4 py-2 mt-2 text-decoration-none">Tìm việc ngay</a>
            </div>

            <!-- Lặp qua các công việc đã lưu -->
            <div class="col-lg-4 col-md-6" th:each="saved : ${savedJobs}">
                <div class="card card-custom p-3 h-100 d-flex flex-column">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img th:src="${saved.jobPost.recruiter.company.logoUrl != null ? saved.jobPost.recruiter.company.logoUrl : 'https://ui-avatars.com/api/?name=' + saved.jobPost.recruiter.company.companyName + '&background=random&color=fff&size=60'}" 
                             alt="Company" class="rounded border p-1" style="width: 60px; height: 60px; object-fit: cover;">
                        <div>
                            <h6 class="fw-bold mb-1 text-primary" th:text="${saved.jobPost.title}">UI/UX Designer</h6>
                            <p class="text-muted small mb-0" th:text="${saved.jobPost.recruiter.company.companyName}">Creative Tech Studio</p>
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-2 text-muted small mb-4 flex-grow-1">
                        <span>
                            <i class="bi bi-cash text-success me-2"></i>
                            <span th:text="${saved.jobPost.salaryMin != null && saved.jobPost.salaryMax != null ? #numbers.formatDecimal(saved.jobPost.salaryMin, 0, 'COMMA', 0, 'POINT') + ' - ' + #numbers.formatDecimal(saved.jobPost.salaryMax, 0, 'COMMA', 0, 'POINT') + ' VND' : 'Thỏa thuận'}">Thỏa thuận</span>
                        </span>
                        <span>
                            <i class="bi bi-geo-alt me-2"></i>
                            <span th:text="${saved.jobPost.province.provinceName}">Hà Nội</span>
                        </span>
                    </div>
                    <div class="d-flex gap-2 mt-auto">
                        <a th:href="@{/candidate/jobs/job-detail/{id}(id=${saved.jobPost.jobId})}" class="btn btn-outline-primary-custom flex-grow-1 text-center text-decoration-none">Xem chi tiết</a>
                        <form th:action="@{/candidate/saved-jobs/unsave}" method="post" class="d-inline">
                            <input type="hidden" name="jobId" th:value="${saved.jobPost.jobId}"/>
                            <button type="submit" class="btn btn-outline-danger px-3"><i class="bi bi-trash"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{fragments/footer.html :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
