<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách việc làm - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/candidate.css">
</head>
<body>

<div th:replace="~{fragments/header.html :: header(activePage='jobs')}"></div>

<div class="candidate-layout">
    <div th:replace="~{fragments/candidate-sidebar.html :: candidate-sidebar}"></div>

    <main class="candidate-content">
        <h3 class="fw-bold mb-4">Danh sách việc làm</h3>

        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card card-custom filter-card p-3">
                    <h5 class="fw-bold mb-3">Bộ lọc tìm kiếm</h5>
                    <form th:action="@{/candidate/jobs/list-job}" method="get">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Từ khóa</label>
                            <input type="text" name="search-keyword" th:value="${searchKeyword}" class="form-control"
                                   placeholder="Tên công việc...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Ngành nghề</label>
                            <select class="form-select" name="industry">
                                <option value="-1" th:selected="${industryId == null}">Tất cả</option>
                                <option th:each="industryResponse : ${industryResponses}"
                                        th:text="${industryResponse.getIndustryName()}"
                                        th:value="${industryResponse.getIndustryId()}"
                                        th:selected="${industryResponse.getIndustryId() == industryId}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">Địa điểm</label>
                            <select class="form-select" name="province">
                                <option value="-1" th:selected="${provinceId == null}">Tất cả</option>
                                <option th:each="provinceResponse : ${provinceResponses}"
                                        th:text="${provinceResponse.getProvinceName()}"
                                        th:value="${provinceResponse.getProvinceId()}"
                                        th:selected="${provinceResponse.getProvinceId() == provinceId}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">Mức lương tối thiểu (VNĐ)</label>
                            <div class="row g-2">
                                <div class="col-12">
                                    <input type="number" name="minSalary" th:value="${minSalary}" class="form-control"
                                           placeholder="Tối thiểu" min="0">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary-custom w-100">Lọc kết quả</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="row g-3">
                    <div class="col-md-6" th:each="jobPostResponse : ${jobPostResponses}">
                        <div class="card card-custom p-3 h-100 d-flex flex-column">
                            <div class="d-flex align-items-center gap-3 mb-3">
                                <img src="https://ui-avatars.com/api/?name=Tech+Corp&background=random&color=fff&size=60"
                                     alt="Company" class="rounded border p-1"
                                     style="width: 60px; height: 60px; object-fit: cover;">
                                <div>
                                    <h6 class="fw-bold mb-1 text-primary text-truncate" style="max-width: 200px;"
                                        th:text="${jobPostResponse.jobTitle}">Senior Frontend Developer</h6>
                                    <p class="text-muted small mb-0" th:text="${jobPostResponse.companyName}"></p>
                                </div>
                            </div>
                            <div class="d-flex flex-column gap-2 text-muted small mb-3 flex-grow-1">
                                <span>
                                    <i class="bi bi-cash text-success me-2"></i>
                                    <span th:text="${jobPostResponse.getSalaryDisplay()}"></span>
                                </span>
                                <span>
                                    <i class="bi bi-geo-alt me-2"></i>
                                    <span th:text="${jobPostResponse.getCompanyProvinceAddress()}"></span>
                                </span>
                                <span>
                                    <i class="bi bi-clock text-danger me-2"></i>
                                    <span th:text="${'Hạn nộp: ' + #temporals.format(jobPostResponse.getExpirationDate(), 'dd/MM/yyyy')}"></span>
                                </span>
                            </div>
                            <div class="mt-auto">
                                <a th:href="@{/candidate/jobs/job-detail/{id}(id=${jobPostResponse.getJobId()})}" class="btn btn-outline-primary-custom w-100">Xem chi tiết</a>
                            </div>
                        </div>
                    </div>
                </div>

                <nav aria-label="Page navigation" class="mt-5">
                    <ul class="pagination justify-content-center">

                        <!-- Previous -->
                        <li class="page-item"
                            th:classappend="${jobPage.first} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/candidate/jobs/list-job(page=${jobPage.number - 1},
                        industry=${selectedIndustryId},
                        province=${selectedProvinceId},
                        search-keyword=${searchKeyword},
                        minSalary=${minSalary},
                        maxSalary=${maxSalary})}">
                                Trước
                            </a>
                        </li>

                        <!-- Danh sách số trang -->
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(startPage,endPage)}"
                            th:classappend="${i == jobPage.number} ? 'active'">

                            <a class="page-link"
                               th:text="${i + 1}"
                               th:href="@{/candidate/jobs/list-job(page=${i},
                        industry=${selectedIndustryId},
                        province=${selectedProvinceId},
                        search-keyword=${searchKeyword},
                        minSalary=${minSalary},
                        maxSalary=${maxSalary})}">
                            </a>

                        </li>

                        <!-- Next -->
                        <li class="page-item"
                            th:classappend="${jobPage.last} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/candidate/jobs/list-job(page=${jobPage.number + 1},
                        industry=${selectedIndustryId},
                        province=${selectedProvinceId},
                        search-keyword=${searchKeyword},
                        minSalary=${minSalary},
                        maxSalary=${maxSalary})}">
                                Sau
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{fragments/footer.html :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
